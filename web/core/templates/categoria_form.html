{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if categoria %}Editar{% else %}Nueva{% endif %} Categoría</title>
    <link rel="stylesheet" href="{% static 'css/tienda.css' %}">
</head>
<body>
    <nav class="tienda-nav">
        <div class="contenedor">
            <span class="marca">Tienda en Línea</span>
            <a href="{% url 'catalogo' %}">Catálogo</a>
            <a href="{% url 'ver_carrito' %}">Carrito</a>
            <a href="{% url 'historial_pedidos' %}">Pedidos</a>
            <a href="{% url 'listar_categorias' %}">Categorías</a>
            <a href="{% url 'listar_productos_admin' %}">Productos</a>
        </div>
    </nav>

    <div class="contenedor">
        <div class="encabezado-pagina">
            <h1>{% if categoria %}Editar Categoría{% else %}Nueva Categoría{% endif %}</h1>
        </div>

        <div class="formulario-tarjeta">
            <form method="post">
                {% csrf_token %}
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" value="{{ categoria.nombre|default:'' }}" required>

                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" rows="3">{{ categoria.descripcion|default:'' }}</textarea>

                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>
        </div>
    </div>
</body>
</html>
