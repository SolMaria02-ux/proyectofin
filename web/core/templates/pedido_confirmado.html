{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pedido Confirmado — Tienda en Línea</title>
    <link rel="stylesheet" href="{% static 'css/tienda.css' %}">
</head>
<body>
    <nav class="tienda-nav">
        <div class="contenedor">
            <span class="marca">Tienda en Línea</span>
            <a href="{% url 'catalogo' %}">Catálogo</a>
            <a href="{% url 'ver_carrito' %}">Carrito</a>
            <a href="{% url 'historial_pedidos' %}">Pedidos</a>
            <a href="{% url 'listar_categorias' %}">Categorías</a>
            <a href="{% url 'listar_productos_admin' %}">Productos</a>
        </div>
    </nav>

    <div class="contenedor">
        <div class="estado-vacio">
            <div class="icono">✅</div>
            <h1>¡Pedido confirmado!</h1>
            <p>Tu pedido <strong>#{{ pedido.id }}</strong> se registró correctamente.</p>
            <p class="total-final">Total: ${{ pedido.total }}</p>
            <a class="btn btn-primary" href="{% url 'historial_pedidos' %}">Ver historial de pedidos</a>
            <a class="btn btn-fantasma" href="{% url 'catalogo' %}">Seguir comprando</a>
        </div>
    </div>
</body>
</html>
