<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if producto %}Editar{% else %}Nuevo{% endif %} Producto</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 30px auto; padding: 0 20px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { margin-top: 16px; background: #2a5db0; color: white; border: none; padding: 10px 16px; border-radius: 4px; cursor: pointer; }
        nav a { margin-right: 16px; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'catalogo' %}">Catálogo</a>
        <a href="{% url 'ver_carrito' %}">Carrito</a>
        <a href="{% url 'historial_pedidos' %}">Historial de pedidos</a>
        <a href="{% url 'listar_categorias' %}">Categorías</a>
        <a href="{% url 'listar_productos_admin' %}">Administrar Productos</a>
    </nav>

    <h1>{% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}</h1>

    <form method="post">
        {% csrf_token %}
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" value="{{ producto.nombre|default:'' }}" required>

        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" rows="3">{{ producto.descripcion|default:'' }}</textarea>

        <label for="precio">Precio:</label>
        <input type="number" step="0.01" min="0" id="precio" name="precio" value="{{ producto.precio|default:'' }}" required>

        <label for="stock">Stock:</label>
        <input type="number" min="0" id="stock" name="stock" value="{{ producto.stock|default:'' }}" required>

        <label for="categoria_id">Categoría:</label>
        <select id="categoria_id" name="categoria_id" required>
            <option value="">Seleccione una categoría</option>
            {% for cat in categorias %}
                <option value="{{ cat.id }}" {% if producto.categoria_id == cat.id %}selected{% endif %}>{{ cat.nombre }}</option>
            {% endfor %}
        </select>

        <button type="submit">Guardar</button>
    </form>
</body>
</html>
